name: "Github actions PHP images (with Python tools)"

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/githubactions-php-python.yml"
      - "githubactions-php-python/**"
  pull_request:
    paths:
      - ".github/workflows/githubactions-php-python.yml"
      - "githubactions-php-python/**"
  schedule:
    - cron:  '0 0 * * 1'
  # Enable manual run
  workflow_dispatch:

env:
  # These will check Repository Variables first (perfect for fork), then use the default
  DOCKER_IMAGES_REPO: ${{ vars.DOCKER_IMAGES_REPO || 'glpi-project/docker-images' }}
  GHCR_BASE_IMAGE: ${{ vars.GHCR_BASE_IMAGE || 'ghcr.io/glpi-project/githubactions-php' }}
  GHCR_IMAGE: ${{ vars.GHCR_IMAGE || 'ghcr.io/glpi-project/githubactions-php-python' }}

jobs:
  build:
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "7.4"
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"
    steps:
      - name: "Set variables"
        run: |
          OUTPUTS="type=image"
          if [[ "${{ github.ref }}" = 'refs/heads/main' && "${{ github.repository }}" = '${{ env.DOCKER_IMAGES_REPO }}' ]]; then
              OUTPUTS="$OUTPUTS,push=true"
          fi
          echo "OUTPUTS=$OUTPUTS" >> $GITHUB_ENV
      - name: "Checkout"
        uses: "actions/checkout@v6"
      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@v3"
      - name: "Login to DockerHub"
        uses: "docker/login-action@v3"
        with:
          username: "${{ secrets.DOCKER_HUB_USERNAME }}"
          password: "${{ secrets.DOCKER_HUB_TOKEN }}"
      - name: "Login to Github container registry"
        uses: "docker/login-action@v3"
        with:
          registry: "ghcr.io"
          username: "${{ secrets.GHCR_USERNAME }}"
          password: "${{ secrets.GHCR_ACCESS_TOKEN }}"
      - name: "Build and push"
        uses: "docker/build-push-action@v6"
        with:
          build-args: |
            BASE_IMAGE=${{ env.GHCR_BASE_IMAGE }}:${{ matrix.php-version }}
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"
          context: "githubactions-php-python"
          outputs: "${{ env.OUTPUTS }}"
          pull: true
          tags: "${{ env.GHCR_IMAGE }}:${{ matrix.php-version }}"
